<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weather Forecast App</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

:root{
--bg-light:linear-gradient(to right,#74ebd5,#acb6e5);
--text-color:#333;
--box-bg:#fff;
}

body{
margin:0;
font-family:'Segoe UI',Tahoma;
background:var(--bg-light);
color:var(--text-color);
display:flex;
justify-content:center;
padding:40px;
transition:.4s;
}

.dark-mode{
--bg-light:linear-gradient(to right,#1e1e1e,#3a3a3a);
--text-color:#eee;
--box-bg:#2e2e2e;
}

.weather-container{
background:var(--box-bg);
padding:40px;
border-radius:20px;
width:95%;
max-width:1200px;
box-shadow:0 15px 35px rgba(0,0,0,.15);
position:relative;
}

h1{text-align:center;}

.clock{text-align:center;margin-bottom:25px;}

.search-bar{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
margin-bottom:30px;
}

input,button{
padding:14px;
font-size:16px;
border-radius:10px;
border:none;
}

input{border:1px solid #ccc;width:280px;}

button{
background:#4e9af1;
color:white;
cursor:pointer;
}

.weather-output{
display:flex;
flex-wrap:wrap;
gap:30px;
}

.overview,.forecast-box{
flex:1 1 300px;
padding:20px;
background:var(--box-bg);
border-radius:15px;
text-align:center;
}

.details{
flex:2 1 600px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.info-box{
background:#e9f3fd;
padding:20px;
border-radius:12px;
}

.dark-mode .info-box{background:#444;}

.forecast-container{
display:flex;
flex-wrap:wrap;
gap:15px;
justify-content:space-around;
margin-top:30px;
}

.forecast-box img{width:60px;}

canvas{
margin-top:40px;
background:rgba(255,255,255,0.05);
border-radius:12px;
padding:20px;
}

#toggleMode{
position:absolute;
top:20px;
right:20px;
}

#map{
height:450px;
margin-top:50px;
border-radius:15px;
}

</style>
</head>

<body>

<div class="weather-container">

<button id="toggleMode" onclick="toggleDarkMode()">🌗 Toggle Dark Mode</button>

<h1>🌤 Weather Forecast</h1>

<div class="clock" id="clock"></div>

<div class="search-bar">
<input id="cityInput" placeholder="Enter city name">
<button onclick="startVoiceSearch()">🎤</button>
<button onclick="getWeather()">Get Weather</button>
<button onclick="getLocationWeather()">📍 Use My Location</button>
</div>

<div id="weatherResult"></div>

<canvas id="tempChart"></canvas>

<h2 style="text-align:center;margin-top:40px;">🌍 World Weather Map</h2>
<div id="map"></div>

</div>

<script>

const apiKey="853947b9d7ede67e953b2f275315ddd6";
let tempChart;

/* CLOCK */

setInterval(()=>{
document.getElementById("clock").innerHTML=new Date().toLocaleString();
},1000);

/* DARK MODE */

function toggleDarkMode(){
document.body.classList.toggle("dark-mode");
}

/* WEATHER */

async function getWeather(city=null){

const input=document.getElementById("cityInput");
const result=document.getElementById("weatherResult");

city=city||input.value.trim();

if(!city){
result.innerHTML="❗ Enter city name";
return;
}

try{

const weatherRes=await fetch(
`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`
);

const weatherData=await weatherRes.json();

const forecastRes=await fetch(
`https://api.openweathermap.org/data/2.5/forecast?q=${city}&appid=${apiKey}&units=metric`
);

const forecastData=await forecastRes.json();

displayWeather(weatherData,forecastData);
renderChart(forecastData);

}catch{
result.innerHTML="❌ City not found";
}

}

/* DISPLAY */

function displayWeather(data,forecastData){

const {name,main,weather,wind,sys,visibility}=data;

const icon=`https://openweathermap.org/img/wn/${weather[0].icon}@2x.png`;

const forecastItems=forecastData.list.filter((_,i)=>i%8===0).map(item=>`
<div class="forecast-box">
<h4>${new Date(item.dt_txt).toLocaleDateString()}</h4>
<img src="https://openweathermap.org/img/wn/${item.weather[0].icon}@2x.png">
<p><strong>${item.main.temp}°C</strong></p>
<p>${item.weather[0].main}</p>
</div>
`).join("");

document.getElementById("weatherResult").innerHTML=`

<div class="weather-output">

<div class="overview">
<h2>${name}, ${sys.country}</h2>
<img src="${icon}">
<p><strong>${weather[0].main}</strong></p>
<p>🌡 ${main.temp}°C</p>
</div>

<div class="details">
<div class="info-box">🌡 <b>Feels like:</b> ${main.feels_like}°C</div>
<div class="info-box">💧 <b>Humidity:</b> ${main.humidity}%</div>
<div class="info-box">📈 <b>Pressure:</b> ${main.pressure} hPa</div>
<div class="info-box">🌅 <b>Sunrise:</b> ${formatTime(sys.sunrise)}</div>
<div class="info-box">🌇 <b>Sunset:</b> ${formatTime(sys.sunset)}</div>
<div class="info-box">🌫 <b>Visibility:</b> ${visibility/1000} km</div>
<div class="info-box">💨 <b>Wind:</b> ${wind.speed} m/s</div>
</div>

</div>

<div class="forecast-container">${forecastItems}</div>

`;

}

function formatTime(t){
return new Date(t*1000).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

/* CHART */

function renderChart(forecastData){

const nextHours=forecastData.list.slice(0,8);

const labels=nextHours.map(i=>new Date(i.dt_txt).getHours()+":00");
const temps=nextHours.map(i=>i.main.temp);

if(tempChart) tempChart.destroy();

tempChart=new Chart(document.getElementById("tempChart"),{

type:"line",

data:{
labels:labels,
datasets:[{
label:"Temperature °C",
data:temps,
borderColor:"#4e9af1",
backgroundColor:"rgba(78,154,241,0.2)",
fill:true,
tension:.4
}]
}

});

}

/* GEOLOCATION */

function getLocationWeather(){

navigator.geolocation.getCurrentPosition(async pos=>{

const {latitude,longitude}=pos.coords;

const res=await fetch(
`https://api.openweathermap.org/data/2.5/weather?lat=${latitude}&lon=${longitude}&appid=${apiKey}&units=metric`
);

const data=await res.json();

getWeather(data.name);

});

}

/* VOICE SEARCH FIX */

function startVoiceSearch(){

if(!('webkitSpeechRecognition'in window)){
alert("Voice search not supported");
return;
}

const recognition=new webkitSpeechRecognition();

recognition.lang="en-US";
recognition.start();

recognition.onresult=function(e){

let city=e.results[0][0].transcript;

/* REMOVE PUNCTUATION */

city=city.replace(/[.,!?]/g,"").trim();

document.getElementById("cityInput").value=city;

getWeather(city);

};

}

/* WORLD MAP */

const map=L.map("map").setView([20,0],2);

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{attribution:"© OpenStreetMap"}
).addTo(map);

L.tileLayer(
`https://tile.openweathermap.org/map/clouds_new/{z}/{x}/{y}.png?appid=${apiKey}`,
{opacity:0.5}
).addTo(map);

map.on("click",async function(e){

const lat=e.latlng.lat;
const lon=e.latlng.lng;

const res=await fetch(
`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${apiKey}&units=metric`
);

const data=await res.json();

document.getElementById("cityInput").value=data.name;

getWeather(data.name);

});

</script>

</body>
</html>
